# Docker Compose for production/staging deployment.
#
# Architecture: single "app" container runs both frontend (port 3000) and backend (port 4000).
#   - Only port 3000 is exposed to the internet.
#   - Port 4000 is bound to the Docker network only (not published externally).
#   - Agent turns run as hardened sibling Docker containers (AGENT_RUNTIME_DRIVER=docker)
#     spawned through the docker-socket-proxy — the raw docker socket is never
#     mounted into the app container.
#   - The runtime container image is built separately (build profile, see below).
#
# This file is PULL-ONLY (deployable with just this file + .env — no source
# tree needed, and safe for tools that run `compose up --build`). To build the
# images from source, use docker-compose.build.yml:
#   docker compose -f docker-compose.build.yml build
#
# Quick start:
#   cp .env.example .env
#   # fill in .env values, then:
#   docker compose up -d
# (the agent-runtime image is auto-pulled by the backend at startup)

services:
  app:
    # Published image (CI: .github/workflows/docker-publish.yml)
    image: ${APP_IMAGE:-logiclabshq/agent-int:latest}
    restart: unless-stopped
    ports:
      # Only the frontend is exposed to the internet
      - '${FRONTEND_PORT:-3000}:3000'
      # Port 4000 (backend) is NOT published — only reachable within the Docker network
    env_file: .env
    environment:
      # Agent runs execute in sibling Docker containers (real OS-level isolation)
      AGENT_RUNTIME_DRIVER: ${AGENT_RUNTIME_DRIVER:-docker}
      AGENT_RUNTIME_IMAGE: ${AGENT_RUNTIME_IMAGE:-logiclabshq/agent-runtime:latest}
      # Runtime containers reach the backend via the compose service name
      AGENT_RUNTIME_PROXY_HOST: http://app:4000
      AGENT_RUNTIME_NETWORK: openagent_runtime
      AGENT_RUNTIME_NETWORK_INTERNAL: openagent_runtime_internal
      # Per-agent workspace subpaths of this named volume are mounted into
      # runtime containers (requires Docker Engine >= 26)
      AGENT_RUNTIME_WORKSPACE_VOLUME: openagent_agent_workspaces
      # The backend talks to the Docker daemon through the socket proxy below —
      # never via a raw socket mount
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      # Fallback path used by the process driver (AGENT_RUNTIME_DRIVER=process)
      AGENT_RUNTIME_ENTRY: /repo/apps/agent-runtime/dist/index.js
      # Per-agent workspace storage as seen by the backend (same volume as above)
      AGENT_WORKSPACES_PATH: /opt/agent-workspaces
      # Headless browser tool (gated by BROWSER_FEATURE_ENABLED in .env; default OFF).
      # When enabled, the backend pulls BROWSER_IMAGE and launches the browser
      # container on the dedicated openagent_browser network below — agents never
      # reach it (only the backend connects), so a shared browser cannot leak one
      # agent's session cookies to another.
      BROWSER_MODE: container
      BROWSER_NETWORK: openagent_browser
      AGENT_BROWSER_STATE_PATH: /opt/agent-browser-state
    volumes:
      # Persist per-agent workspaces across container restarts
      - agent_workspaces:/opt/agent-workspaces
      # Persist browser session state (cookies/logins) across restarts. Backend-only —
      # NEVER mounted into a runtime, so the agent cannot read its own session cookies.
      - agent_browser_state:/opt/agent-browser-state
    networks:
      - default
      # The app must be reachable from BOTH runtime networks so locked-down
      # (internal) runtimes can still call the backend proxy endpoints
      - agent_runtime
      - agent_runtime_internal
      # The browser network — only the backend is on it (not agent runtimes), so
      # the host-managed browser is reachable by the backend but never by agents.
      - agent_browser
    depends_on:
      postgres:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started

  # Restricted gateway to the host Docker daemon. The raw socket is
  # root-equivalent on the host; this proxy exposes only the API groups the
  # DockerDriver needs (container lifecycle, image inspect, network inspect).
  # It must NEVER be attached to the agent runtime networks — a sandboxed
  # agent that could reach it would control the host.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1 # create/inspect/attach/wait/kill/remove runtime containers
      IMAGES: 1 # runtime image presence check at startup
      NETWORKS: 1 # runtime network inspect/create at startup
      VOLUMES: 1 # workspace volume mounts
      POST: 1 # required for create/start/kill/remove
      VERSION: 1 # engine version check (volume subpath needs >= 26)
      PING: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

  postgres:
    # pgvector/pgvector includes the pgvector extension required for the vector column type
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent-int}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to host for local DB access/migrations — remove in production if not needed
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agent-int}']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  agent_workspaces:
    # Stable name so the DockerDriver can reference it for subpath mounts
    # regardless of the compose project prefix
    name: openagent_agent_workspaces
  # Browser session state (Playwright storageState per agent). Backend-only.
  agent_browser_state:
    name: openagent_agent_browser_state

networks:
  default:
    name: openagentintegration_default
  # Runtime network for agents WITH internet access (normal egress)
  agent_runtime:
    name: openagent_runtime
  # Runtime network for agents WITHOUT internet access — internal: true blocks
  # all egress except other containers on this network (i.e. the backend).
  # Credential-proxied call_api requests still work; run_terminal curl/pip do not.
  agent_runtime_internal:
    name: openagent_runtime_internal
    internal: true
  # Browser network — the backend launches the host-managed browser container here
  # (normal egress so it can load pages). Agent runtimes are NEVER attached, so an
  # agent cannot reach the shared browser's debug port or another agent's session.
  agent_browser:
    name: openagent_browser
