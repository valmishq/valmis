id: mailgun
name: Mailgun
brandName: Mailgun
type: basicAuth
icon: /logos/mailgun.svg
description: >
  Connect to Mailgun to send transactional email and manage domains and mailing lists.
  Authenticates via HTTP Basic Auth where the username is the literal "api" and the
  password is your private API key.
documentationUrl: https://documentation.mailgun.com/docs/mailgun/api-reference/mg-auth
properties:
  - name: username
    displayName: Username (always "api")
    type: options
    required: true
    default: api
    description: >
      Mailgun's Basic Auth username is always the literal "api" (the API key is the
      password). This is fixed — leave it as "api".
    options:
      - name: api
        value: api
  - name: password
    displayName: API Key
    type: secret
    required: true
    description: >
      Your Mailgun private API key, found under Account Settings → API Keys.
  - name: baseUrl
    displayName: API Base URL
    type: string
    required: true
    default: https://api.mailgun.net
    description: >
      Region host. US: https://api.mailgun.net, EU: https://api.eu.mailgun.net.

# basicAuth auto-injects Authorization: Basic base64(username:password) — no requestMapping.
testRequest:
  method: GET
  url: '{{properties.baseUrl}}/v4/domains'
  accountIdentifierKey: items.0.name
