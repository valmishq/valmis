id: googleWorkspaceOAuth22
name: Google Workspace (OAuth2)
type: oauth2
description: Authenticate via Google OAuth2. You must create credentials in Google Cloud Console.
documentationUrl: https://developers.google.com/identity/protocols/oauth2

properties:
  - name: clientId
    displayName: Client ID
    type: string
    required: true
  - name: clientSecret
    displayName: Client Secret
    type: secret
    required: true
  - name: scope
    displayName: Scopes
    type: string
    required: true
    description: Space-separated list of Google API scopes
    default: 'https://www.googleapis.com/auth/drive.readonly'

oauth2:
  authorizationUrl: 'https://accounts.google.com/o/oauth2/v2/auth'
  accessTokenUrl: 'https://oauth2.googleapis.com/token'
  clientIdProperty: clientId
  clientSecretProperty: clientSecret
  authStyle: inBody

requestMapping:
  headers:
    Authorization: 'Bearer {{properties.accessToken}}'
