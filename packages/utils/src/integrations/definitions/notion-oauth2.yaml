id: notion-oauth2
name: Notion (OAuth2)
brandName: Notion
type: oauth2
icon: /logos/notion.svg
description: >
  Connect to Notion via OAuth2 (public integration). Allows users to grant access
  to their Notion workspace without sharing an integration token.
  Use this for cross-workspace public integrations that require OAuth2.
documentationUrl: https://developers.notion.com/docs/authorization
properties:
  - name: clientId
    displayName: OAuth Client ID
    type: string
    required: true
    description: >
      Client ID from your Notion public integration.
      Find it in your integration dashboard under Secrets → Client ID.
  - name: clientSecret
    displayName: OAuth Client Secret
    type: secret
    required: true
    description: >
      Client Secret from your Notion public integration.
      Find it in your integration dashboard under Secrets → OAuth client secret.

oauth2:
  authorizationUrl: 'https://api.notion.com/v1/oauth/authorize'
  accessTokenUrl: 'https://api.notion.com/v1/oauth/token'
  clientIdProperty: clientId
  clientSecretProperty: clientSecret
  # Notion requires Basic auth (base64 clientId:clientSecret) for token exchange
  authStyle: inHeader

# Notion requires the Notion-Version header on every API request
requestMapping:
  headers:
    Authorization: 'Bearer {{properties.accessToken}}'
    Notion-Version: '2022-06-28'

testRequest:
  method: GET
  url: https://api.notion.com/v1/users/me
  accountIdentifierKey: name
