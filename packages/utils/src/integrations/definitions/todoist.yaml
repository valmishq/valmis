id: todoist
name: Todoist
brandName: Todoist
type: bearerToken
icon: /logos/todoist.svg
description: >
  Connect to Todoist to manage projects, tasks, sections and labels. The personal API
  token is sent as a Bearer token on every request.
documentationUrl: https://developer.todoist.com/api/v1/
properties:
  - name: apiToken
    displayName: API Token
    type: secret
    required: true
    description: >
      Your Todoist API token, found in the web app under Settings → Integrations →
      Developer.

requestMapping:
  headers:
    Authorization: 'Bearer {{properties.apiToken}}'

# Todoist has no current-user REST endpoint — listing projects validates the token.
testRequest:
  method: GET
  url: 'https://api.todoist.com/api/v1/user'
  accountIdentifierKey: email
