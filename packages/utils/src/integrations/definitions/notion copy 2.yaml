id: notionApi2
name: Notion API
type: bearerToken
icon: https://static.vecteezy.com/system/resources/previews/073/494/911/non_2x/notion-logo-circular-glossy-icon-with-transparent-background-free-png.png
description: Connect to your Notion workspace using an Internal Integration Token.
documentationUrl: https://developers.notion.com/docs/authorization

properties:
  - name: notionToken
    displayName: Internal Integration Token
    type: secret
    required: true
    description: Starts with "secret_"

requestMapping:
  headers:
    Authorization: 'Bearer {{properties.notionToken}}'
    Notion-Version: '2022-06-28'

testRequest:
  method: GET
  url: https://api.notion.com/v1/users/me
