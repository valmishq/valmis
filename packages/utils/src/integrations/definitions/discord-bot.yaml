id: discord-bot
name: Discord (Bot Token)
brandName: Discord
type: bearerToken
icon: /logos/discord.svg
description: >
  Connect to the Discord API using a Bot Token.
  The bot communicates via DM — users pair their account with /pair <CODE>.

  Setup:
  1. Go to https://discord.com/developers/applications and create an application.
  2. Under "Bot", click "Reset Token" and copy the token.
  3. Under "Bot → Privileged Gateway Intents", enable:
     - Message Content Intent (required to read DM text)
     - Direct Messages intent is enabled by default.
  4. Paste the token here.

documentationUrl: https://discord.com/developers/docs/intro
properties:
  - name: token
    displayName: Bot Token
    type: secret
    required: true
    description: >
      Go to https://discord.com/developers/applications, open your app,
      select Bot from the left menu, then reset and copy the token.
      Also enable "Message Content Intent" under Privileged Gateway Intents.

# Discord Bot tokens use "Bot " prefix (not "Bearer ")
requestMapping:
  headers:
    Authorization: 'Bot {{properties.token}}'

# GET /users/@me returns the current bot's user object
testRequest:
  method: GET
  url: 'https://discord.com/api/v10/users/@me'
  accountIdentifierKey: username
