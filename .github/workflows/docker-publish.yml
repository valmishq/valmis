# Builds and publishes the two deployment images to Docker Hub:
#
#   logiclabshq/agent-int       — app image (frontend + backend), root Dockerfile
#   logiclabshq/agent-runtime   — agent sandbox image, apps/agent-runtime/Dockerfile
#
# Both images are published with IDENTICAL tags from the same commit — they must
# stay version-locked: the runtime's ProxyClient and the backend's
# /v1/runtime/internal/* protocol evolve together, and DockerDriver auto-pulls
# AGENT_RUNTIME_IMAGE at backend startup.
#
# Triggers:
#   - Push to main                        → publishes the short commit hash tag
#   - Git tags matching v* (e.g. v1.2.0)  → publishes 1.2.0, 1.2 + commit hash
#   - Manual run (workflow_dispatch)      → publishes the short commit hash tag
#
# No "latest" tag is published — deployments pin an explicit tag via APP_IMAGE
# and AGENT_RUNTIME_IMAGE in .env, keeping both images version-locked.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub account with push access to logiclabshq/*
#   DOCKERHUB_TOKEN    — Docker Hub access token (Read & Write)

name: Publish Docker images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: logiclabshq/agent-int
            dockerfile: Dockerfile
          - image: logiclabshq/agent-runtime
            dockerfile: apps/agent-runtime/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag scheme: every run → short commit hash (e.g. a1b2c3d);
      # v1.2.0 tag push additionally → 1.2.0 + 1.2. No "latest".
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
